<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moodify Premium - AI Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="app-wrapper">
        <div class="glass-container">
            <header>
                <h2 class="premium-logo">MOODIFY <span>PRO</span></h2>
                <div class="status-dot"></div>
            </header>

            <section id="home-screen" class="screen active">
                <div class="welcome-section">
                    <h1 class="royal-text">Welcome, <span>User</span></h1>
                    <p class="subtitle">Experience the future of emotion AI.</p>
                </div>
                
                <div class="premium-grid">
                    <div class="nav-card primary-card" onclick="navigate('camera-screen')">
                        <div class="card-icon">📷</div>
                        <span>Neural Vision</span>
                    </div>
                    <div class="nav-card secondary-card" onclick="navigate('text-screen')">
                        <div class="card-icon">✍️</div>
                        <span>Sentiment Analysis</span>
                    </div>
                    <div class="nav-card history-card" onclick="loadHistory()">
                        <div class="card-icon">📊</div>
                        <span>Insights</span>
                    </div>
                </div>
            </section>

            <section id="camera-screen" class="screen">
                <div class="camera-frame">
                    <div class="scanner-glow"></div>
                    <video id="video" autoplay muted playsinline></video>
                    <div class="corner tl"></div><div class="corner tr"></div>
                    <div class="corner bl"></div><div class="corner br"></div>
                </div>
                <div class="processing-info">
                    <span id="cam-status">Initializing Neural Models...</span>
                </div>
                <button class="btn-royal back-btn" onclick="navigate('home-screen'); stopVideo();">Return Home</button>
            </section>

            <section id="text-screen" class="screen">
                <h3 class="glow-title">Deep Sentiment</h3>
                <div class="premium-input-box">
                    <textarea id="mood-text" placeholder="Share your thoughts..."></textarea>
                </div>
                <button class="btn-royal pulse" onclick="analyzeText()">Process Aura</button>
                <button class="btn-ghost" onclick="navigate('home-screen')">Back</button>
            </section>

            <section id="result-screen" class="screen">
                <div class="aura-display">
                    <div class="aura-circle"></div>
                    <h1 id="detected-mood">✨</h1>
                </div>
                <div class="result-info">
                    <p id="quote"></p>
                </div>
                <button class="btn-royal" onclick="navigate('home-screen')">Finish</button>
            </section>

            <section id="history-screen" class="screen">
                <h3 class="glow-title">Mood Analytics</h3>
                <div class="chart-box">
                    <canvas id="moodChart"></canvas>
                </div>
                <button class="btn-royal" onclick="navigate('home-screen')">Back</button>
            </section>
        </div>
    </div>
</body>
</html>
