<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOODIFY ELITE | Neural AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="royal-bg"></div>
    <div class="app-shell">
        <header>
            <h1 class="premium-logo">MOODIFY <span>ELITE</span></h1>
            <div id="status-indicator" class="dot"></div>
        </header>

        <section id="home-screen" class="screen active">
            <div class="luxury-card welcome">
                <h2>Neural <span>Link</span></h2>
                <p>Advanced emotion diagnostics engine</p>
            </div>
            <div class="grid-nav">
                <div class="gold-card" onclick="navigate('camera-screen')">
                    <span class="icon">📷</span>
                    <h3>VISION SCAN</h3>
                </div>
                <div class="gold-card" onclick="navigate('text-screen')">
                    <span class="icon">✍️</span>
                    <h3>SEMANTIC</h3>
                </div>
                <div class="gold-card full" onclick="loadHistory()">
                    <span class="icon">📊</span>
                    <h3>NEURAL HISTORY</h3>
                </div>
            </div>
        </section>

        <section id="camera-screen" class="screen">
            <div class="camera-viewport">
                <video id="video" autoplay muted playsinline></video>
                <div class="scanner-laser"></div>
            </div>
            <div class="ui-controls">
                <p id="cam-status">Synchronizing Neural models...</p>
                <button id="snap-btn" class="royal-btn ripple" onclick="captureAndAnalyze()">ANALYZE AURA</button>
                <button class="ghost-btn" onclick="navigate('home-screen'); stopVideo();">Cancel</button>
            </div>
        </section>

        <section id="result-screen" class="screen">
            <div class="luxury-card result-box">
                <div class="aura-glow" id="aura-ring"></div>
                <h1 id="main-emoji">✨</h1>
                <h2 id="mood-label">SCANNING...</h2>
            </div>
            <div class="stats-panel" id="emotion-stats"></div>
            <button class="royal-btn" onclick="navigate('home-screen')">NEW SCAN</button>
        </section>

        <section id="text-screen" class="screen">
            <textarea id="mood-text" placeholder="Enter behavioral data..."></textarea>
            <button class="royal-btn" onclick="analyzeText()">EXTRACT</button>
            <button class="ghost-btn" onclick="navigate('home-screen')">Back</button>
        </section>
    </div>
</body>
</html>
