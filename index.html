<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moodify - 3D AI Mood Detector</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="app-container" data-tilt data-tilt-glare data-tilt-max-glare="0.2" data-tilt-max="3" data-tilt-speed="400">
        <header>
            <h2>✨ Moodify 3D</h2>
            <button id="theme-toggle" class="btn-3d-circle">🌙</button>
        </header>

        <section id="home-screen" class="screen active">
            <div class="hero">
                <h1 class="glow-text">Eppudi irukinga innaiku?</h1>
                <p>AI moolama unga mood kandupudiklam!</p>
            </div>
            <div class="button-group">
                <button class="btn btn-3d primary" onclick="navigate('camera-screen')">
                    <span class="btn-content">📷 Check via Camera</span>
                </button>
                <button class="btn btn-3d secondary" onclick="navigate('text-screen')">
                    <span class="btn-content">✍️ Check via Text</span>
                </button>
                <button class="btn btn-3d outline" onclick="loadHistory()">
                    <span class="btn-content">📊 View History</span>
                </button>
            </div>
        </section>

        <section id="camera-screen" class="screen">
            <h3 class="glow-text">Face Emotion Detection</h3>
            <div class="video-wrapper">
                <div class="video-container">
                    <video id="video" width="300" height="300" autoplay muted></video>
                </div>
            </div>
            <p id="cam-status" class="status-badge">Loading AI models... Wait pannunga</p>
            <button class="btn btn-3d outline" onclick="navigate('home-screen'); stopVideo();">
                <span class="btn-content">⬅️ Back</span>
            </button>
        </section>

        <section id="text-screen" class="screen">
            <h3 class="glow-text">Express Yourself</h3>
            <div class="input-wrapper">
                <textarea id="mood-text" rows="5" placeholder="Unga feelings-a inga type pannunga..."></textarea>
            </div>
            <button class="btn btn-3d primary" onclick="analyzeText()">
                <span class="btn-content">✨ Analyze Mood</span>
            </button>
            <button class="btn btn-3d outline" onclick="navigate('home-screen')">
                <span class="btn-content">⬅️ Back</span>
            </button>
        </section>

        <section id="result-screen" class="screen">
            <h3 class="glow-text">Your Mood is...</h3>
            <div class="result-card">
                <h1 id="detected-mood" class="floating-emoji">Happy 😊</h1>
            </div>
            
            <div class="suggestions 3d-box">
                <h4>Suggestions for you:</h4>
                <p id="quote" class="quote-text">"Keep smiling!"</p>
                <div class="song-tip">
                    <span id="song">🎵 Song: Happy by Pharrell Williams</span>
                </div>
            </div>
            <button class="btn btn-3d primary" onclick="navigate('home-screen')">
                <span class="btn-content">🏠 Go Home</span>
            </button>
        </section>

        <section id="history-screen" class="screen">
            <h3 class="glow-text">Mood History</h3>
            <div class="chart-container 3d-box">
                <canvas id="moodChart"></canvas>
            </div>
            <button class="btn btn-3d outline" onclick="navigate('home-screen')">
                <span class="btn-content">⬅️ Back</span>
            </button>
        </section>
    </div>

</body>
</html>
